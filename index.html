<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="TC Lingo — 検索練習・出力添削・同一テーマ反復に絞った語学学習アプリ。" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#f5f8fb" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#111820" media="(prefers-color-scheme: dark)" />
    <title>TC Lingo</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Apply the saved theme before first paint to avoid a flash of the wrong
         theme (FOUC). Mirrors useTheme(): the choice is stored as a raw
         "light"/"dark" string under tc-lingo:theme; default is light. -->
    <script>
      (function () {
        try {
          if (localStorage.getItem('tc-lingo:theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
